# CI quality gates (docs/TODO.md T6.3; PRD §2 G4/G5, §4.3).
#
# Established EARLY so every push and pull request runs the full gate stack
# before feature work lands. The steps run in order and the build fails on the
# first failure: a cheap gate (lint/format) guards an expensive one (tests).
#
# Forward-compatible gates: the 150-line check (TODO.md T6.4) and the secret
# scan are wired now but skip cleanly until their tooling lands, so the
# scaffold pipeline is GREEN today and each gate activates automatically once
# its script/tool is committed — no edit to this file required.
name: CI

on:
  push:
  pull_request:

jobs:
  quality-gates:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Official uv installer; matches the .python-version pin (3.12).
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install workspace (uv sync)
        run: uv sync

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy

      # Coverage threshold is config-driven: the ≥85% gate lives in
      # [tool.coverage.report].fail_under in pyproject.toml (TODO.md T1.3), so
      # this step carries no hard-coded number that could diverge from config.
      - name: Tests + coverage (pytest, fail under 85%)
        run: uv run pytest --cov --cov-report=term-missing

      # TODO.md T6.4 drops in scripts/check_line_limit.py; until then this skips.
      - name: 150-line file check
        run: |
          if [ -f scripts/check_line_limit.py ]; then
            uv run python scripts/check_line_limit.py
          else
            echo "line-limit check pending TODO.md T6.4 (scripts/check_line_limit.py absent)"
          fi

      # A committed scripts/secret_scan.py wires the real secret scan; until
      # then this skips (see PRD §4.3: secrets via env only, never committed).
      - name: Secret scan
        run: |
          if [ -f scripts/secret_scan.py ]; then
            uv run python scripts/secret_scan.py
          else
            echo "secret scan pending (scripts/secret_scan.py absent)"
          fi
